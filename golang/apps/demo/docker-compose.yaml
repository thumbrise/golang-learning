name: "golang-demo"

include:
  - docker-compose.observability.yaml
  - docker-compose.load.yaml

services:
  app:
    extends:
      file: docker-compose.common.yaml
      service: common_backend
    ports:
      - "127.0.0.1:${DOCKER_PORT_APP:?}:${HTTP_PORT:?}"
    command: go run . serve
    healthcheck:
      test: wget --spider http://localhost:${HTTP_PORT:?}/health
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s

  app_comments_batcher:
    extends:
      file: docker-compose.common.yaml
      service: common_backend
    command: go run . comments batch
    depends_on:
      redis:
        condition: service_healthy

  redis:
    env_file: .env
    image: redis:8.6.1-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DOCKER_PORT_REDIS:?}:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./.docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:17.9-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:?}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
      POSTGRES_DB: ${DB_DATABASE:?}
      PGUSER: ${DB_USERNAME:?}
      PGPASSWORD: ${DB_PASSWORD:?}
      PGDATABASE: ${DB_DATABASE:?}
    ports:
      - "127.0.0.1:${DOCKER_PORT_DB:?}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./.docker/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c shared_preload_libraries='pg_stat_statements'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME}", "-d", "${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - "127.0.0.1:${DOCKER_PORT_MAILPIT_WEB:?}:8025"
      - "127.0.0.1:${DOCKER_PORT_MAILPIT_SMTP:?}:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  app_gopath:
  db_data:
  mailpit_data:
  redis_data:
