extensions:
  health_check:
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
      disk:
      load:
      filesystem:
      memory:
      network:
      paging:
  httpcheck:
    targets:
      - endpoint: 'http://localhost:13133/health/status'
        method: GET
      - endpoint: 'http://localhost:13134/health/status'
        method: GET
    collection_interval: 15s
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14317
  postgresql:
    endpoint: ${DB_HOST}:${DB_PORT}
    transport: tcp
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    databases:
      - uptrace
    tls:
      insecure: true
  prometheus/otelcol:
    config:
      scrape_configs:
        - job_name: 'otelcol'
          scrape_interval: 10s
          static_configs:
            - targets: ['0.0.0.0:8888']
  redis:
    endpoint: ${REDIS_URL}
    collection_interval: 10s
    password: ${REDIS_PASSWORD}

processors:
  resourcedetection:
    detectors: ['system']
  batch:
    send_batch_size: 10000
    timeout: 10s

exporters:
  otlp/uptrace:
    endpoint: uptrace:4317
    tls:
      insecure: true
    headers:
      uptrace-dsn: 'http://project1_secret@uptrace:4317'
  prometheusremotewrite/uptrace:
    endpoint: 'http://uptrace:80/api/v1/prometheus/write'
    tls:
      insecure: true
    headers:
      uptrace-dsn: 'http://project1_secret@uptrace:4317'

service:
  telemetry:
    metrics:
      address: ':8888'
  #   logs:
  #     level: DEBUG
  pipelines:
    traces:
      receivers: [otlp, jaeger]
      processors: [batch]
      exporters: [otlp/uptrace]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/uptrace]
    metrics/hostmetrics:
      receivers: [hostmetrics, postgresql, httpcheck, redis]
      processors: [batch, resourcedetection]
      exporters: [otlp/uptrace]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/uptrace]
    metrics/prom:
      receivers: [prometheus/otelcol]
      processors: [batch]
      exporters: [prometheusremotewrite/uptrace]

  extensions: [health_check, pprof, zpages]
